# Base config. All secrets/connection details come from environment variables so the same
# image runs locally, in Docker, and on a VPS without code changes (see architecture.md).
spring:
  application:
    name: companieswatch

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/companieswatch}
    username: ${DB_USER:companieswatch}
    password: ${DB_PASSWORD:companieswatch}

  jpa:
    hibernate:
      # Flyway owns the schema. Hibernate must never alter it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # SMTP for alert emails. Provider-agnostic: point MAIL_* at any service (AWS SES, Resend,
  # Postmark, Gmail, ...). Only used when companieswatch.alerts.email.enabled=true; until then
  # the logging notifier runs and these are inert.
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:true}
      # Port 587 → STARTTLS=true, SSL=false. Port 465 → SSL=true, STARTTLS=false.
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:true}
      mail.smtp.ssl.enable: ${MAIL_SMTP_SSL:false}
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

server:
  port: ${SERVER_PORT:8080}

# Alerts. v1 ships with email as the only channel. Set enabled=true and configure the spring.mail.*
# block above to send real email; otherwise the logging notifier is active.
companieswatch:
  alerts:
    email:
      enabled: ${ALERTS_EMAIL_ENABLED:false}
      from: ${ALERTS_EMAIL_FROM:alerts@britintel.app}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    # Alerts are async best-effort; don't gate app health on the SMTP provider being reachable
    # (and don't let the actuator probe SMTP on every health check).
    mail:
      enabled: false

# Placeholders for config wired up in later build steps (kept here so the seams are visible).
companieshouse:
  rest:
    base-url: ${CH_REST_BASE_URL:https://api.company-information.service.gov.uk}
    api-key: ${CH_REST_API_KEY:}
    # Stay under the ~600 req / 5-min (~2/sec) REST limit from day one (data-sources.md).
    permits-per-second: ${CH_REST_PERMITS_PER_SECOND:2}
    burst: ${CH_REST_BURST:4}
  streaming:
    base-url: ${CH_STREAM_BASE_URL:https://stream.companieshouse.gov.uk}
    api-key: ${CH_STREAM_API_KEY:}
    enabled: ${CH_STREAM_ENABLED:true}
    # Max 2 (Companies House connection cap). v1 default is one: company profile.
    streams: ${CH_STREAM_NAMES:companies}
    reconnect-base-delay-millis: 1000
    reconnect-max-delay-millis: 60000
    flush-every: ${CH_STREAM_FLUSH_EVERY:25}
